# # ==========================================
# # INTERRUPTORES FÍSICOS NO PCF #1 (Relés 1-8)
# # ==========================================

- platform: gpio
  name: "Interruptor 1"
  id: interruptor1
  pin:
    pcf8574: pcf8574_1
    number: 0
    mode: INPUT
    inverted: true
  filters:
    - delayed_on_off: 100ms
  on_state:
    then:
      - switch.toggle: rele1

